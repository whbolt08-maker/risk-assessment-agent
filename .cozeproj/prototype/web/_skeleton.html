<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体：Playfair Display 用于标题，Noto Serif SC 用于中文标题 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（杂志风：黑白克制） === */
      --color-primary:              #111111;
      --color-primary-container:    #E8E4DB;
      --color-on-primary:           #F4F1EA;
      /* === 背景 / 表面（温暖纸张色阶） === */
      --color-background:                 #F4F1EA;
      --color-surface-container-lowest:   #F4F1EA;
      --color-surface:                    #F4F1EA;
      --color-surface-container:          #EDE9E0;
      --color-surface-container-high:     #E5E0D5;
      --color-surface-container-highest:  #DDD7CB;
      /* === 文字 === */
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      /* === 功能色（低饱和度，配合杂志气质） === */
      --color-success:  #2D5016;
      --color-error:    #8B2500;
      --color-warning:  #8B6914;
      /* === 边框 === */
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #E5E0D5;
      /* === 圆角（杂志风偏严肃，小圆角） === */
      --radius-sm:   0.125rem;
      --radius-md:   0.25rem;
      --radius-lg:   0.375rem;
      --radius-xl:   0.5rem;
      --radius-2xl:  0.75rem;
      --radius-full: 9999px;
      /* === 阴影（克制柔和） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.10);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.08);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-6 border-b border-outline/30">
    <div class="flex items-center gap-3">
      <i data-lucide="shield-check" class="w-5 h-5 text-primary"></i>
      <span class="font-serif font-bold text-lg tracking-tight">Risk Assessment Agent</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-primary text-on-primary flex items-center justify-center text-xs font-medium">初</div>
        <span class="text-sm text-on-surface-variant">小初</span>
      </div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <aside class="w-56 shrink-0 bg-surface-container overflow-y-auto border-r border-outline/20">
      <nav class="p-3 space-y-0.5">
        <a href="home.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md bg-primary text-on-primary font-medium text-sm">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>仪表盘
        </a>
        <a href="new-assessment.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="file-plus" class="w-4 h-4"></i>新建评估
        </a>
        <a href="history.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="history" class="w-4 h-4"></i>评估历史
        </a>
        <a href="detail.html" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="file-search" class="w-4 h-4"></i>评估详情
        </a>
      </nav>
    </aside>

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- @main-content:end -->
    </main>
  </div>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <script>lucide.createIcons();</script>
</body>

</html>
